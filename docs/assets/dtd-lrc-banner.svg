<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">DTD-LRC research artifact banner</title>
  <desc id="desc">A two-stage uncertainty-gated cascade for open-world machine-generated text detection.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081525"/>
      <stop offset="0.55" stop-color="#102b46"/>
      <stop offset="1" stop-color="#153c55"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#47d7ff"/>
      <stop offset="1" stop-color="#7cf2c6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>
  <circle cx="1110" cy="66" r="170" fill="#47d7ff" opacity="0.06"/>
  <circle cx="1195" cy="295" r="205" fill="#7cf2c6" opacity="0.05"/>

  <g transform="translate(70 58)">
    <text x="0" y="48" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="48" font-weight="760" letter-spacing="0.5">DTD-LRC</text>
    <rect x="0" y="68" width="370" height="5" rx="2.5" fill="url(#accent)"/>
    <text x="0" y="112" fill="#c9d8e7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="500">Uncertainty-Gated Evidence Escalation</text>
    <text x="0" y="144" fill="#9fb4c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">for Open-World Machine-Generated Text Detection</text>

    <text x="0" y="202" fill="#7cf2c6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="650">Fast when confident. Deeper when uncertain.</text>
    <text x="0" y="235" fill="#8ea7bd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Sole-author research artifact · Submitted to UncertaiNLP 2026 @ EMNLP</text>
  </g>

  <g transform="translate(640 64)" filter="url(#shadow)">
    <rect x="0" y="0" width="205" height="112" rx="18" fill="#10283d" stroke="#47d7ff" stroke-width="2"/>
    <text x="22" y="34" fill="#82e6ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">STAGE 1 · DTD</text>
    <text x="22" y="65" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="720">AUC 0.9899</text>
    <text x="22" y="90" fill="#a9bdcf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">38 ms average latency</text>

    <path d="M218 56 H276" stroke="#7cf2c6" stroke-width="4" stroke-linecap="round"/>
    <path d="M264 44 L278 56 L264 68" fill="none" stroke="#7cf2c6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="219" y="36" fill="#9fb4c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">uncertain only</text>

    <rect x="292" y="0" width="240" height="112" rx="18" fill="#10283d" stroke="#7cf2c6" stroke-width="2"/>
    <text x="314" y="34" fill="#9ff5d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">STAGE 2 · MS-LRC</text>
    <text x="314" y="65" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="720">AUC 0.9622</text>
    <text x="314" y="90" fill="#a9bdcf" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">cross-family evidence</text>

    <rect x="0" y="143" width="532" height="96" rx="18" fill="#0d2234" stroke="#2c526c" stroke-width="1.5"/>
    <text x="22" y="174" fill="#cfe2ef" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="650">CASCADE ROUTING</text>
    <text x="22" y="207" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="720">31 / 120 escalated</text>
    <text x="278" y="207" fill="#7cf2c6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="650">74.2% resolved at Stage 1</text>
  </g>
</svg>
